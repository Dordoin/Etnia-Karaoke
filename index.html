<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Etnia Karaoke Restobar — Pide tu canción</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

html, body { margin: 0; padding: 0; background: #000; }

.kw-root, .kw-root * { box-sizing: border-box; }

.kw-root {
  --stage: #000000;
  --curtain: #131315;
  --curtain-border: #26262B;
  --lime: #DAFD01;
  --lime-deep: #A9C400;
  --lime-dim: rgba(218,253,1,.14);
  --danger: #FF5C4D;
  --danger-deep: #C6392C;
  --free: #8B919C;
  --paper: #F7F8F0;
  --paper-dim: #E1E3D2;
  --ink: #101010;
  --ink-soft: #5A5B52;
  --fog: #9B9CA3;
  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 22px;

  min-height: 100vh;
  width: 100%;
  background: var(--stage);
  color: var(--paper);
  font-family: 'Space Grotesk', sans-serif;
  padding: 28px 16px 72px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.kw-root .display { font-family: 'Bungee', cursive; letter-spacing: .5px; }
.kw-root .mono { font-family: 'Space Mono', monospace; }

.kw-wrap { width: 100%; max-width: 480px; display: flex; flex-direction: column; align-items: center; }
.kw-wrap.wide { max-width: 880px; }

.kw-brand { text-align: center; margin-bottom: 26px; }
.kw-brand img.logo { width: min(300px, 78vw); display: block; margin: 0 auto 14px; }
.kw-brand .welcome {
  font-family: 'Bungee', cursive;
  font-size: 17px;
  line-height: 1.5;
  color: var(--lime);
  text-shadow: 0 0 16px rgba(218,253,1,.55), 0 0 40px rgba(218,253,1,.25);
  max-width: 340px;
  margin: 0 auto;
}
.kw-brand .eyebrow { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 3px; color: var(--fog); text-transform: uppercase; }

/* ---- ticket card ---- */
.kw-ticket {
  position: relative;
  background: var(--paper);
  color: var(--ink);
  border-radius: var(--r-lg);
  padding: 30px 26px;
  width: 100%;
  box-shadow: 0 20px 50px rgba(218,253,1,.06);
}
.kw-ticket::before, .kw-ticket::after {
  content: '';
  position: absolute;
  width: 26px; height: 26px;
  background: var(--stage);
  border-radius: 50%;
  top: 50%;
  transform: translateY(-50%);
}
.kw-ticket::before { left: -13px; }
.kw-ticket::after { right: -13px; }
.kw-ticket .perf { border-top: 2px dashed var(--paper-dim); margin: 20px 0; }

.kw-label { font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-soft); font-weight: 600; margin-bottom: 7px; display: block; }
.kw-hint { font-size: 12px; color: var(--ink-soft); margin-top: -9px; margin-bottom: 14px; line-height: 1.5; }

.kw-input {
  width: 100%;
  font-family: 'Space Mono', monospace;
  font-size: 17px;
  padding: 13px 14px;
  border-radius: var(--r-sm);
  border: 2px solid var(--paper-dim);
  background: #fff;
  color: var(--ink);
  outline: none;
  transition: border-color .15s ease;
}
.kw-input:focus { border-color: var(--lime-deep); }
.kw-input.code { text-align: center; font-size: 26px; letter-spacing: 8px; }
.kw-input.code::placeholder { letter-spacing: 6px; }
.kw-input::placeholder { color: #C2C4B0; }

.kw-field { margin-bottom: 16px; }

/* selector mesa/barra en el ingreso */
.kw-type-toggle { display: flex; gap: 9px; margin-bottom: 16px; }
.kw-type-btn {
  flex: 1;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 14px;
  padding: 12px 8px;
  border-radius: var(--r-sm);
  border: 2px solid var(--paper-dim);
  background: #fff;
  color: var(--ink-soft);
  cursor: pointer;
  transition: all .12s ease;
}
.kw-type-btn.active { border-color: var(--lime-deep); background: #FBFFDB; color: var(--ink); }

.kw-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 15px;
  padding: 14px 18px;
  border-radius: var(--r-sm);
  border: none;
  cursor: pointer;
  transition: transform .1s ease, filter .15s ease;
}
.kw-btn:active { transform: scale(.98); }
.kw-btn:disabled { opacity: .55; cursor: not-allowed; }
.kw-btn.lime { background: var(--lime); color: #0C0D00; }
.kw-btn.lime:hover { filter: brightness(1.05); }
.kw-btn.outline-lime { background: transparent; color: var(--lime); border: 2px solid var(--lime-deep); }
.kw-btn.outline-lime:hover { background: var(--lime-dim); }
.kw-btn.danger { background: transparent; color: var(--danger); border: 2px solid var(--danger-deep); }
.kw-btn.danger:hover { background: rgba(255,92,77,.09); }
.kw-btn.ghost { background: transparent; color: var(--fog); border: 2px solid var(--curtain-border); }
.kw-btn.sm { padding: 9px 12px; font-size: 13px; width: auto; }

.kw-link { background: none; border: none; color: var(--fog); font-family: 'Space Grotesk', sans-serif; font-size: 13px; cursor: pointer; text-decoration: underline; padding: 6px; }
.kw-link:hover { color: var(--paper); }

.kw-error { color: var(--danger); font-size: 13px; margin-top: 10px; min-height: 16px; font-weight: 600; }
.kw-error:empty { display: none; }

/* ---- header bar ---- */
.kw-topbar {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
  gap: 12px;
  flex-wrap: wrap;
}
.kw-topbar .title { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.kw-topbar .title img.logo-sm { height: 26px; display: block; }
.kw-topbar .title .display { font-size: 20px; color: var(--lime); }
.kw-topbar .title .mono { font-size: 13px; color: var(--fog); background: var(--curtain); border: 1px solid var(--curtain-border); padding: 4px 9px; border-radius: 20px; }

.kw-limit-info {
  width: 100%;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  letter-spacing: .5px;
  color: var(--lime);
  background: var(--lime-dim);
  border: 1px solid var(--lime-deep);
  border-radius: 20px;
  padding: 7px 14px;
  text-align: center;
  margin-bottom: 16px;
}

/* ---- indicador "ahora canta" ---- */
.kw-now-line {
  width: 100%;
  text-align: center;
  font-size: 14.5px;
  background: var(--curtain);
  border: 1px solid var(--lime-deep);
  color: var(--paper);
  border-radius: var(--r-md);
  padding: 12px 14px;
  margin-bottom: 16px;
}
.kw-now-line strong { color: var(--lime); font-family: 'Space Mono', monospace; letter-spacing: 1px; }
.kw-now-line.idle { border-color: var(--curtain-border); color: var(--fog); }
.kw-now-line.mine {
  background: var(--lime);
  color: #0C0D00;
  font-weight: 800;
  border-color: var(--lime);
  box-shadow: 0 0 26px rgba(218,253,1,.45);
  animation: kwTurn 1.4s ease-in-out infinite;
}
@keyframes kwTurn { 0%,100% { transform: scale(1); } 50% { transform: scale(1.02); } }

.kw-now-card {
  width: 100%;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  background: var(--curtain);
  border: 2px solid var(--lime-deep);
  border-radius: var(--r-md);
  padding: 13px 16px;
  margin-bottom: 26px;
}
.kw-now-card .nlabel { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--fog); }
.kw-now-card .ncurrent { font-family: 'Bungee', cursive; font-size: 17px; color: var(--lime); }
.kw-now-card select {
  margin-left: auto;
  background: var(--stage);
  color: var(--paper);
  border: 1px solid var(--curtain-border);
  border-radius: 6px;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  padding: 6px 8px;
  cursor: pointer;
}
.kw-now-card select:focus { outline: none; border-color: var(--lime-deep); }

/* ---- customer message banner ---- */
.kw-msg-banner {
  width: 100%;
  background: var(--lime);
  color: #0C0D00;
  border-radius: var(--r-md);
  padding: 14px 16px;
  margin-bottom: 18px;
  display: flex; align-items: flex-start; gap: 10px;
  box-shadow: 0 0 24px rgba(218,253,1,.3);
  animation: kwSlideIn .3s ease;
}
@keyframes kwSlideIn { from { transform: translateY(-8px); opacity: 0; } to { transform: none; opacity: 1; } }
.kw-msg-banner .mtxt { flex: 1; font-weight: 700; font-size: 14.5px; }
.kw-msg-banner .mfrom { display: block; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 400; margin-bottom: 3px; opacity: .7; }
.kw-msg-banner button { background: rgba(0,0,0,.12); border: none; border-radius: 6px; width: 26px; height: 26px; cursor: pointer; font-size: 13px; color: #0C0D00; flex-shrink: 0; }

/* ---- party size picker ---- */
.kw-party-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 9px; margin: 4px 0 14px; }
.kw-party-btn {
  font-family: 'Space Mono', monospace;
  font-size: 19px;
  font-weight: 700;
  padding: 15px 0;
  border-radius: var(--r-sm);
  border: 2px solid var(--paper-dim);
  background: #fff;
  color: var(--ink);
  cursor: pointer;
  transition: all .12s ease;
}
.kw-party-btn:hover { border-color: var(--lime-deep); background: #FBFFDB; }
.kw-party-note { font-size: 12.5px; color: var(--ink-soft); line-height: 1.55; }
.kw-party-note.funny { background: #FFFBE0; border: 1px dashed #D9C86A; border-radius: var(--r-sm); padding: 10px 12px; margin-top: 12px; }

/* ---- rules card ---- */
.kw-rules {
  width: 100%;
  background: var(--curtain);
  border: 1px solid var(--curtain-border);
  border-radius: var(--r-md);
  padding: 16px 18px;
  margin-top: 24px;
}
.kw-rules h3 {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--lime);
  margin: 0 0 10px;
}
.kw-rules ul { margin: 0; padding-left: 18px; }
.kw-rules li { font-size: 13px; color: var(--fog); line-height: 1.65; }
.kw-rules li strong { color: var(--paper); font-weight: 600; }
.kw-rules .rule-danger { color: var(--danger); font-weight: 700; }
.kw-rules .rule-danger strong { color: var(--danger); }

/* ---- redes sociales y direcciones ---- */
.kw-social { display: flex; gap: 14px; justify-content: center; margin-top: 28px; }
.kw-social a {
  width: 46px; height: 46px;
  border-radius: 50%;
  border: 2px solid var(--lime-deep);
  display: flex; align-items: center; justify-content: center;
  color: var(--lime);
  transition: all .15s ease;
}
.kw-social a:hover { background: var(--lime-dim); transform: translateY(-2px); }
.kw-locations { margin-top: 18px; text-align: center; font-size: 12.5px; color: var(--fog); line-height: 1.8; }
.kw-locations strong { color: var(--lime); font-weight: 700; }

/* ---- seat grid (admin / mozo) ---- */
.kw-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 12px; width: 100%; margin-bottom: 30px; }
.kw-tcard {
  background: var(--curtain);
  border: 2px solid var(--curtain-border);
  border-radius: var(--r-md);
  padding: 16px 14px;
  display: flex; flex-direction: column; gap: 10px;
  position: relative;
}
.kw-tcard.live { border-color: var(--lime-deep); box-shadow: 0 0 0 1px var(--lime-dim), 0 10px 24px rgba(218,253,1,.07); }
.kw-tcard .tnum { font-weight: 700; font-size: 16px; }
.kw-status { display: flex; align-items: center; gap: 6px; font-family: 'Space Mono', monospace; font-size: 10.5px; letter-spacing: 1.5px; text-transform: uppercase; }
.kw-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.kw-dot.live { background: var(--lime); box-shadow: 0 0 8px 2px rgba(218,253,1,.7); animation: kwPulse 1.8s ease-in-out infinite; }
.kw-dot.free { background: var(--free); }
@keyframes kwPulse { 0%,100% { opacity: 1; } 50% { opacity: .45; } }
.kw-tcard .code-big { font-family: 'Space Mono', monospace; font-size: 25px; font-weight: 700; color: var(--lime); letter-spacing: 3px; }
.kw-tcard .free-tag { font-size: 12px; color: var(--fog); }
.kw-party-row { display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--fog); }
.kw-party-row select {
  background: var(--stage);
  color: var(--paper);
  border: 1px solid var(--curtain-border);
  border-radius: 6px;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  padding: 4px 6px;
  cursor: pointer;
}
.kw-party-row select:focus { outline: none; border-color: var(--lime-deep); }
.kw-remove { position: absolute; top: 10px; right: 12px; background: none; border: none; color: var(--fog); font-size: 12px; cursor: pointer; opacity: .6; }
.kw-remove:hover { opacity: 1; color: var(--danger); }
.kw-addcard {
  border: 2px dashed var(--curtain-border);
  border-radius: var(--r-md);
  display: flex; align-items: center; justify-content: center;
  color: var(--fog);
  font-size: 13px;
  min-height: 96px;
  cursor: pointer;
  background: none;
  font-family: 'Space Grotesk', sans-serif;
}
.kw-addcard:hover { color: var(--paper); border-color: var(--fog); }

/* ---- message composer ---- */
.kw-composer { border-top: 1px solid var(--curtain-border); padding-top: 10px; display: flex; flex-direction: column; gap: 8px; }
.kw-chip {
  background: var(--lime-dim);
  border: 1px solid var(--lime-deep);
  color: var(--lime);
  border-radius: 20px;
  padding: 7px 11px;
  font-size: 12px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  cursor: pointer;
  text-align: left;
}
.kw-chip:hover { background: rgba(218,253,1,.24); }
.kw-composer input {
  width: 100%;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  padding: 9px 11px;
  border-radius: var(--r-sm);
  border: 1px solid var(--curtain-border);
  background: var(--stage);
  color: var(--paper);
  outline: none;
}
.kw-composer input:focus { border-color: var(--lime-deep); }
.kw-sent-note { font-family: 'Space Mono', monospace; font-size: 10.5px; color: var(--lime); letter-spacing: 1px; }

/* ---- queue ---- */
.kw-section-title { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 14px; }
.kw-section-title h2 { font-size: 15px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--fog); font-weight: 700; margin: 0; }

.kw-qgroup { width: 100%; margin-bottom: 18px; }
.kw-qgroup-head {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  font-family: 'Space Mono', monospace;
  font-size: 11.5px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--lime);
  border-bottom: 1px dashed var(--curtain-border);
  padding-bottom: 6px;
  margin-bottom: 9px;
}
.kw-qgroup-head .right { display: flex; align-items: center; gap: 8px; }
.kw-qgroup-head .count { color: var(--fog); letter-spacing: .5px; }
.kw-onstage { background: var(--lime); color: #0C0D00; padding: 2px 9px; border-radius: 12px; font-size: 10px; font-weight: 700; }
.kw-mini-stage {
  background: none;
  border: 1px solid var(--curtain-border);
  border-radius: 12px;
  color: var(--fog);
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  padding: 3px 9px;
  cursor: pointer;
}
.kw-mini-stage:hover { border-color: var(--lime-deep); color: var(--lime); }

.kw-qrow {
  background: var(--paper);
  color: var(--ink);
  border-radius: var(--r-sm);
  padding: 13px 16px;
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 9px;
  border-left: 5px solid var(--lime-deep);
}
.kw-qrow.done { opacity: .55; border-left-color: var(--free); }
.kw-qrow.cancelled { opacity: .45; border-left-color: var(--danger-deep); }
.kw-qrow .qbadge { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; background: var(--stage); color: var(--lime); padding: 4px 8px; border-radius: 6px; flex-shrink: 0; }
.kw-qrow .qmain { flex: 1; min-width: 0; }
.kw-qrow .qsong { font-weight: 700; font-size: 14.5px; }
.kw-qrow .qmeta { font-size: 12.5px; color: var(--ink-soft); margin-top: 2px; word-break: break-word; }
.kw-qrow .qmeta a { color: #3E6ACC; font-weight: 600; }
.kw-qrow .qtime { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--ink-soft); flex-shrink: 0; }
.kw-qrow .qactions { display: flex; gap: 6px; flex-shrink: 0; }
.kw-iconbtn { border: none; background: var(--stage); color: var(--paper); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 14px; display:flex; align-items:center; justify-content:center; }
.kw-iconbtn.ok:hover { background: var(--lime-deep); color: #0C0D00; }
.kw-iconbtn.del:hover { background: var(--danger-deep); }

.kw-empty { color: var(--fog); font-size: 14px; padding: 22px; text-align: center; border: 2px dashed var(--curtain-border); border-radius: var(--r-md); width: 100%; }

.kw-stub {
  background: var(--curtain);
  border: 2px solid var(--curtain-border);
  border-radius: var(--r-sm);
  padding: 12px 14px;
  margin-bottom: 9px;
  width: 100%;
}
.kw-stub .qsong { font-weight: 700; font-size: 14.5px; }
.kw-stub .qmeta { font-size: 12.5px; color: var(--fog); margin-top: 3px; word-break: break-word; }
.kw-stub .qmeta a { color: var(--lime); }
.kw-tag { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px; border-radius: 20px; display: inline-block; margin-top: 6px; }
.kw-tag.pending { background: var(--lime-dim); color: var(--lime); }
.kw-tag.done { background: rgba(139,145,156,.18); color: var(--free); }
.kw-tag.cancelled { background: rgba(255,92,77,.15); color: var(--danger); }

/* etiqueta de modo: cantar / escuchar */
.kw-mode {
  font-family: 'Space Mono', monospace;
  font-size: 9.5px;
  letter-spacing: 1px;
  padding: 3px 8px;
  border-radius: 12px;
  font-weight: 700;
  vertical-align: middle;
  margin-left: 7px;
  white-space: nowrap;
  display: inline-block;
}
.kw-mode.cantar { background: var(--lime); color: #0C0D00; }
.kw-mode.escuchar { background: #3E6ACC; color: #fff; }

.kw-history-toggle { text-align: center; margin: 6px 0 18px; }
.kw-footlink { margin-top: 22px; text-align: center; }

@media (max-width: 460px) {
  .kw-topbar .title .display { font-size: 17px; }
  .kw-ticket { padding: 24px 18px; }
  .kw-brand .welcome { font-size: 15px; }
  .kw-now-card select { margin-left: 0; width: 100%; }
}
</style>
</head>
<body>

<div class="kw-root" id="kw-app">
  <div class="kw-wrap"><div style="padding:60px 0;color:var(--fog);font-family:'Space Mono',monospace;font-size:13px;">Cargando…</div></div>
</div>

<script>
(function () {
  // 🔧 Configuración del local — edita estos valores como quieras.
  const CONFIG = {
    venueName: 'Etnia Karaoke Restobar',
    adminPin: 'etnia2olivosprime',   // código del ADMINISTRADOR
    waiters: [                        // códigos de los MOZOS (solo lectura + mensajes)
      { name: 'Marlon',  code: 'Marlon1' },
      { name: 'Roxana',  code: 'Roxana2' },
      { name: 'Paulo',   code: 'Paulo3' },
      { name: 'Nicole',  code: 'Nicole4' },
    ],
    defaultTableCount: 8,
    defaultBarCount: 6,
    quickMessages: [
      '🎤 ¡Te toca cantar! Acércate al escenario.',
      '⏭️ Tu canción es la siguiente, prepárate.',
      '🍻 ¿Desean pedir algo más de la carta?',
      '⚠️ Esa canción no está disponible, elige otra por favor.',
    ],
    rules: [
      'El karaoke rige según el número de orden de mesa.',
      '<strong>1 canción</strong> para 1 persona que viene sola.',
      '<strong>2 canciones</strong> para grupos de 2 a 6 personas.',
      '<strong>3 canciones</strong> para grupos de 7 a más personas.',
      '<strong>S/ 30.00</strong> de consumo por persona para activar el karaoke.',
      '<span class="rule-danger">🚫 Está PROHIBIDO golpear el micrófono. En caso se rompa, deberá pagarse una <strong>multa</strong>.</span>',
    ],
    socials: {
      facebook: 'https://www.facebook.com/EtniaKaraoke',
      instagram: 'https://www.instagram.com/etniakaraoke/',
      tiktok: 'https://www.tiktok.com/@etniakaraoke',
    },
    addresses: [
      { name: 'Los Olivos', text: 'Av. César Vallejo 899 A Int. 3 — Los Olivos' },
      { name: 'Independencia', text: 'Calle 1 #159 Int. 2 — Independencia' },
    ],

  const TABLES_KEY = 'karaoke_tables_v1';
  const REQUESTS_KEY = 'karaoke_requests_v1';

  const root = document.getElementById('kw-app');

  let state = {
    view: 'loading',          // login | staffLogin | customer | admin | waiter
    tables: {},               // { "M1": {...}, "B1": {...}, "_now": {seat, time} }
    requests: [],
    currentSeat: null,
    sessionCode: null,
    customerMode: 'picker',

  let pollTimer = null;

  // ---------- storage ----------
  // Prioridad: (1) Firebase si está configurado, (2) almacenamiento compartido
  // de Claude si existe, (3) localStorage del navegador (solo este dispositivo).
  const FIREBASE_URL = (CONFIG.firebaseDatabaseURL || '').trim().replace(/\/+$/, '');
  const useFirebase = /^https:\/\/.+/i.test(FIREBASE_URL);
  const hasSharedStorage = typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function';
  if (!useFirebase && !hasSharedStorage) {
    console.warn('Etnia Karaoke: sin base de datos configurada. Los datos solo se guardan en este dispositivo. Configura CONFIG.firebaseDatabaseURL para uso real.');
  }

  async function storageGet(key) {
    if (useFirebase) {
      try {
        const res = await fetch(FIREBASE_URL + '/karaoke/' + encodeURIComponent(key) + '.json', { cache: 'no-store' });
        if (!res.ok) return undefined;               // fallo de lectura
        const val = await res.json();                 // null = no existe aún
        if (val === null) return null;
        return typeof val === 'string' ? val : JSON.stringify(val);
      } catch (e) { return undefined; }
    }
    if (hasSharedStorage) {
      try {
        const res = await window.storage.get(key, true);
        return res ? res.value : null;
      } catch (e) { return undefined; } // undefined = fallo de lectura, NO "no existe"
    }
    try { return localStorage.getItem(key); } catch (e) { return undefined; }
  }
  async function storageSet(key, value) {
    if (useFirebase) {
      try {
        const res = await fetch(FIREBASE_URL + '/karaoke/' + encodeURIComponent(key) + '.json', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(value),
        });
        return res.ok;
      } catch (e) { return false; }
    }
    if (hasSharedStorage) {
      try { await window.storage.set(key, value, true); return true; }
      catch (e) { return false; }
    }
    try { localStorage.setItem(key, value); return true; } catch (e) { return false; }
  }

  async function refreshTables() {
    const raw = await storageGet(TABLES_KEY);
    if (raw === undefined || raw === null) return state.tables;
    try { state.tables = migrateTables(JSON.parse(raw)); } catch (e) {}
    return state.tables;
  }
  async function refreshRequests() {
    const raw = await storageGet(REQUESTS_KEY);
    if (raw === undefined || raw === null) return state.requests;
    try { state.requests = migrateRequests(JSON.parse(raw)); } catch (e) {}
    return state.requests;
  }
  async function saveTables() {
    let ok = await storageSet(TABLES_KEY, JSON.stringify(state.tables));
    if (!ok) ok = await storageSet(TABLES_KEY, JSON.stringify(state.tables));
    return ok;
  }
  async function saveRequests() {
    let ok = await storageSet(REQUESTS_KEY, JSON.stringify(state.requests));
    if (!ok) ok = await storageSet(REQUESTS_KEY, JSON.stringify(state.requests));
    return ok;
  }

  // ---------- migración de formatos anteriores ----------
  function migrateTables(tables) {
    const out = {};
    for (const key of Object.keys(tables)) {
      const t = tables[key];
      if (key === '_now') { out._now = t; continue; }   // conservar "ahora canta"
      if (t && t.type && t.num) { out[key] = t; continue; }
      const num = Number(key);
      if (!isNaN(num)) {
        out['M' + num] = Object.assign({ type: 'mesa', num: num, partySize: null, message: null }, t, { type: 'mesa', num: num });
      }
    }
    return out;
  }
  function migrateRequests(reqs) {
    return reqs.map(r => {
      const tbl = String(r.table);
      if (/^\d+$/.test(tbl)) return Object.assign({}, r, { table: 'M' + tbl });
      return r;
    });
  }

  // ---------- utils ----------
  function escapeHtml(str) {
    return String(str || '').replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function timeAgo(ts) {
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60) return 'ahora';
    const m = Math.floor(s / 60);
    if (m < 60) return 'hace ' + m + ' min';
    const h = Math.floor(m / 60);
    return 'hace ' + h + ' h';
  }
  function genCode(existingCodes) {
    let code, tries = 0;
    do {
      code = String(Math.floor(1000 + Math.random() * 9000));
      tries++;
    } while (existingCodes.indexOf(code) !== -1 && tries < 50);
    return code;
  }
  function songLimit(partySize) {
    const n = Number(partySize);
    if (!n || n < 1) return 0;
    if (n === 1) return 1;
    if (n <= 6) return 2;
    return 3;
  }
  function pendingCountFor(seatId) {
    return state.requests.filter(r => String(r.table) === String(seatId) && r.status === 'pending').length;
  }
  function newSeat(type, num) {
    return { type: type, num: num, status: 'available', code: null, openedAt: null, message: null, partySize: null };
  }
  function defaultTables() {
    const t = {};
    for (let i = 1; i <= CONFIG.defaultTableCount; i++) t['M' + i] = newSeat('mesa', i);
    for (let i = 1; i <= CONFIG.defaultBarCount; i++) t['B' + i] = newSeat('barra', i);
    return t;
  }
  function seatsOf(type) {
    return Object.keys(state.tables)
      .filter(id => id !== '_now' && state.tables[id] && state.tables[id].type === type)
      .sort((a, b) => state.tables[a].num - state.tables[b].num);
  }
  function seatLabel(id) {
    const t = state.tables[id];
    if (!t) return id;
    return (t.type === 'barra' ? 'Barra ' : 'Mesa ') + t.num;
  }
  function seatIcon(id) {
    const t = state.tables[id];
    return t && t.type === 'barra' ? '🍹' : '🍽️';
  }
  function nowSeatId() {
    const now = state.tables && state.tables._now;
    if (now && now.seat && state.tables[now.seat] && state.tables[now.seat].status === 'occupied') return now.seat;
    return null;
  }
  function isWaiter() { return state.view === 'waiter'; }
  function safeLink(url) {
    url = String(url || '').trim();
    return /^https?:\/\//i.test(url) ? url : null;
  }
  function rulesHtml() {
    return `<div class="kw-rules">
      <h3>📋 Reglas del karaoke</h3>
      <ul>${CONFIG.rules.map(r => `<li>${r}</li>`).join('')}</ul>
    </div>`;
  }
  function limitInfoText() {
    const t = state.tables[state.currentSeat];
    if (!t || !t.partySize) return '';
    const lim = songLimit(t.partySize);
    return `👥 Grupo de ${t.partySize}${Number(t.partySize) >= 8 ? '+' : ''} · hasta ${lim} ${lim === 1 ? 'canción' : 'canciones'} en cola`;
  }
  function socialFooterHtml() {
    const s = CONFIG.socials;
    const iconFb = `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M22 12.06C22 6.5 17.52 2 12 2S2 6.5 2 12.06c0 5.02 3.66 9.18 8.44 9.94v-7.03H7.9v-2.9h2.54V9.85c0-2.5 1.5-3.89 3.77-3.89 1.1 0 2.24.2 2.24.2v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56v1.88h2.78l-.45 2.9h-2.33V22c4.78-.76 8.44-4.92 8.44-9.94z"/></svg>`;
    const iconIg = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.4" cy="6.6" r="1.1" fill="currentColor" stroke="none"/></svg>`;
    const iconTk = `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16.7 5.9c-.9-.62-1.56-1.66-1.78-2.9h-3.1v12.5a2.63 2.63 0 1 1-2.63-2.63c.27 0 .54.04.8.12V9.9a5.74 5.74 0 1 0 4.93 5.68V9.4a7.06 7.06 0 0 0 3.63 1V7.32c-.66 0-1.31-.17-1.85-.52z"/></svg>`;
    return `<div class="kw-social">
      <a href="${s.facebook}" target="_blank" rel="noopener" title="Facebook" aria-label="Facebook de Etnia">${iconFb}</a>
      <a href="${s.instagram}" target="_blank" rel="noopener" title="Instagram" aria-label="Instagram de Etnia">${iconIg}</a>
      <a href="${s.tiktok}" target="_blank" rel="noopener" title="TikTok" aria-label="TikTok de Etnia">${iconTk}</a>
    </div>
    <div class="kw-locations">
      ${CONFIG.addresses.map(a => `<div>📍 <strong>${escapeHtml(a.name)}:</strong> ${escapeHtml(a.text)}</div>`).join('')}
    </div>`;
  }

  // ---------- init ----------
  async function init() {
    const tablesRaw = await storageGet(TABLES_KEY);
    if (tablesRaw === null) {
      state.tables = defaultTables();
      await saveTables();
    } else if (typeof tablesRaw === 'string') {
      try {
        state.tables = migrateTables(JSON.parse(tablesRaw));
        if (seatsOf('barra').length === 0) {
          for (let i = 1; i <= CONFIG.defaultBarCount; i++) state.tables['B' + i] = newSeat('barra', i);
        }
        await saveTables();
      } catch (e) { state.tables = defaultTables(); await saveTables(); }
    } else {
      state.tables = defaultTables();
    }
    const reqRaw = await storageGet(REQUESTS_KEY);
    if (reqRaw === null) { state.requests = []; await saveRequests(); }
    else if (typeof reqRaw === 'string') {
      try { state.requests = migrateRequests(JSON.parse(reqRaw)); await saveRequests(); }
      catch (e) { state.requests = []; }
    }
    else state.requests = [];
    state.view = 'login';
    render();
  }

  function stopPolling() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }
  function startPolling() {
    stopPolling();
    pollTimer = setInterval(async () => {
      await refreshTables();
      await refreshRequests();
      if (state.view === 'customer') {
        const t = state.tables[state.currentSeat];
        if (!t || t.status !== 'occupied' || t.code !== state.sessionCode) {
          stopPolling();
          state.view = 'login';
          state.currentSeat = null;
          state.sessionCode = null;
          state.dismissedMsgId = null;
          state.loginError = 'Tu sesión fue cerrada. ¡Gracias por cantar en Etnia! 🎤';
          render();
          return;
        }
        const desiredMode = t.partySize ? 'order' : 'picker';
        if (desiredMode !== state.customerMode) {
          state.customerMode = desiredMode;
          render();
          return;
        }
        const infoEl = document.getElementById('kw-limit-info');
        if (infoEl) infoEl.textContent = limitInfoText();
        updateNowLine();
        updateMyQueue();
        updateMsgBanner();
      } else if (state.view === 'admin' || state.view === 'waiter') {
        if (state.msgOpenFor === null) updateStaffSeats();
        updateStaffQueue();
        updateNowControl();
        updateNowLine();
      }
    }, 5000);
  }

  // ---------- actions: customer ----------
  window.KW = {};

  KW.setLoginType = function (type) {
    state.loginType = type;
    const mb = document.getElementById('kw-type-mesa');
    const bb = document.getElementById('kw-type-barra');
    if (mb && mb.classList) mb.classList.toggle('active', type === 'mesa');
    if (bb && bb.classList) bb.classList.toggle('active', type === 'barra');
  };

  KW.handleLoginSubmit = async function (e) {
    e.preventDefault();
    const input = document.getElementById('kw-code-input');
    const code = (input.value || '').trim();
    state.loginError = '';
    await refreshTables();
    const allIds = Object.keys(state.tables).filter(id => id !== '_now');
    const matchId = allIds.find(id => state.tables[id].status === 'occupied' && state.tables[id].code === code);
    const errEl = document.getElementById('kw-login-error');
    if (!matchId) {
      state.loginError = 'Código inválido. Pídele el código a tu mozo.';
      if (errEl) errEl.textContent = state.loginError;
      return;
    }
    const seat = state.tables[matchId];
    if (seat.type !== state.loginType) {
      state.loginError = seat.type === 'barra'
        ? 'Ese código es de la BARRA 🍹 — cambia tu selección arriba 😉'
        : 'Ese código es de una MESA 🍽️ — cambia tu selección arriba 😉';
      if (errEl) errEl.textContent = state.loginError;
      return;
    }
    state.currentSeat = matchId;
    state.sessionCode = seat.code;
    state.dismissedMsgId = null;
    state.customerMode = seat.partySize ? 'order' : 'picker';
    state.view = 'customer';
    render();
    startPolling();
  };

  KW.setSongMode = function (mode) {
    state.songMode = mode;
    const cb = document.getElementById('kw-mode-cantar');
    const eb = document.getElementById('kw-mode-escuchar');
    if (cb && cb.classList) cb.classList.toggle('active', mode === 'cantar');
    if (eb && eb.classList) eb.classList.toggle('active', mode === 'escuchar');
  };

  KW.setPartySize = async function (n) {
    n = Number(n);
    await refreshTables();
    const t = state.tables[state.currentSeat];
    if (!t || t.status !== 'occupied' || t.code !== state.sessionCode) return;
    t.partySize = n;
    const ok = await saveTables();
    if (!ok) { alert('No se pudo guardar, inténtalo de nuevo.'); return; }
    state.customerMode = 'order';
    render();
  };

  KW.goStaffLogin = function () { state.loginError = ''; state.view = 'staffLogin'; render(); };
  KW.backToLogin = function () { state.loginError = ''; state.adminError = ''; state.msgOpenFor = null; state.waiterName = null; stopPolling(); state.view = 'login'; render(); };

  KW.handleStaffLoginSubmit = async function (e) {
    e.preventDefault();
    const input = document.getElementById('kw-pin-input');
    const code = (input.value || '').trim();
    const lower = code.toLowerCase();
    const errEl = document.getElementById('kw-admin-error');
    if (lower === CONFIG.adminPin.toLowerCase()) {
      state.adminError = '';
      state.view = 'admin';
      state.waiterName = null;
      await refreshTables();
      await refreshRequests();
      render();
      startPolling();
      return;
    }
    const waiter = CONFIG.waiters.find(w => w.code.toLowerCase() === lower);
    if (waiter) {
      state.adminError = '';
      state.view = 'waiter';
      state.waiterName = waiter.name;
      await refreshTables();
      await refreshRequests();
      render();
      startPolling();
      return;
    }
    state.adminError = 'Código incorrecto.';
    if (errEl) errEl.textContent = state.adminError;
  };

  KW.exitCustomer = function () {
    stopPolling();
    state.loginError = '';
    state.currentSeat = null;
    state.sessionCode = null;
    state.dismissedMsgId = null;
    state.view = 'login';
    render();
  };

  KW.handleSubmitSong = async function (e) {
    e.preventDefault();
    const songEl = document.getElementById('kw-song');
    const artistEl = document.getElementById('kw-artist');
    const linkEl = document.getElementById('kw-songlink');
    const errEl = document.getElementById('kw-song-error');
    if (errEl) errEl.textContent = '';
    const song = (songEl.value || '').trim();
    if (!song) { songEl.focus(); return; }

    const btn = document.getElementById('kw-submit-btn');
    btn.disabled = true; btn.textContent = 'Agregando…';
    await refreshTables();
    await refreshRequests();

    const t = state.tables[state.currentSeat];
    const lim = songLimit(t && t.partySize);
    const pending = pendingCountFor(state.currentSeat);
    if (lim > 0 && pending >= lim) {
      btn.disabled = false; btn.textContent = 'Pedir canción';
      if (errEl) errEl.textContent = `🎶 Ya tienes ${lim} ${lim === 1 ? 'canción' : 'canciones'} en cola. Espera a que canten una para pedir otra 😉`;
      return;
    }

    state.requests.push({
      id: Date.now() + '-' + Math.random().toString(36).slice(2, 7),
      table: state.currentSeat,
      song: song,
      artist: (artistEl.value || '').trim(),
      link: (linkEl.value || '').trim(),
      mode: state.songMode === 'escuchar' ? 'escuchar' : 'cantar',
      status: 'pending',
      time: Date.now(),
    });
    const ok = await saveRequests();
    btn.disabled = false; btn.textContent = 'Pedir canción';
    if (!ok) {
      if (errEl) errEl.textContent = 'No se pudo enviar tu canción, inténtalo de nuevo.';
      return;
    }
    songEl.value = ''; artistEl.value = ''; linkEl.value = '';
    updateMyQueue();
    songEl.focus();
  };

  KW.dismissMsg = function () {
    const t = state.tables[state.currentSeat];
    if (t && t.message) state.dismissedMsgId = t.message.id;
    updateMsgBanner();
  };

  // ---------- actions: admin ----------
  KW.openSeat = async function (id) {
    if (isWaiter()) return;
    await refreshTables();
    const t = state.tables[id];
    if (!t) return;
    const activeCodes = Object.keys(state.tables).filter(k => k !== '_now').map(k => state.tables[k]).filter(x => x.status === 'occupied').map(x => x.code);
    state.tables[id] = Object.assign({}, newSeat(t.type, t.num), { status: 'occupied', code: genCode(activeCodes), openedAt: Date.now() });
    const ok = await saveTables();
    if (!ok) alert('No se pudo guardar. Revisa tu conexión e intenta de nuevo.');
    updateStaffSeats();
    updateNowControl();
  };
  KW.closeSeat = async function (id) {
    if (isWaiter()) return;
    await refreshTables();
    const t = state.tables[id];
    if (!t) return;
    state.tables[id] = newSeat(t.type, t.num);
    if (state.tables._now && state.tables._now.seat === id) delete state.tables._now;
    const ok = await saveTables();
    if (!ok) alert('No se pudo guardar. Revisa tu conexión e intenta de nuevo.');
    await refreshRequests();
    state.requests = state.requests.map(r => (String(r.table) === String(id) && r.status === 'pending') ? Object.assign({}, r, { status: 'cancelled' }) : r);
    await saveRequests();
    if (String(state.msgOpenFor) === String(id)) state.msgOpenFor = null;
    updateStaffSeats();
    updateStaffQueue();
    updateNowControl();
  };
  KW.setPartySizeAdmin = async function (id, val) {
    if (isWaiter()) return;
    await refreshTables();
    const t = state.tables[id];
    if (!t || t.status !== 'occupied') return;
    t.partySize = val === '' ? null : Number(val);
    const ok = await saveTables();
    if (!ok) alert('No se pudo guardar la corrección, intenta de nuevo.');
    updateStaffSeats();
  };
  KW.addSeat = async function (type) {
    if (isWaiter()) return;
    await refreshTables();
    const nums = seatsOf(type).map(id => state.tables[id].num);
    const next = nums.length ? Math.max.apply(null, nums) + 1 : 1;
    const id = (type === 'barra' ? 'B' : 'M') + next;
    state.tables[id] = newSeat(type, next);
    await saveTables();
    updateStaffSeats();
  };
  KW.removeSeat = async function (id) {
    if (isWaiter()) return;
    await refreshTables();
    if (state.tables[id] && state.tables[id].status === 'occupied') return;
    delete state.tables[id];
    await saveTables();
    updateStaffSeats();
  };
  KW.markDone = async function (id) {
    if (isWaiter()) return;
    await refreshRequests();
    state.requests = state.requests.map(r => r.id === id ? Object.assign({}, r, { status: 'done' }) : r);
    await saveRequests();
    updateStaffQueue();
  };
  KW.deleteRequest = async function (id) {
    if (isWaiter()) return;
    await refreshRequests();
    state.requests = state.requests.filter(r => r.id !== id);
    await saveRequests();
    updateStaffQueue();
  };
  // "Ahora canta": solo el administrador lo controla
  KW.setNow = async function (id) {
    if (isWaiter()) return;
    await refreshTables();
    if (id && state.tables[id] && state.tables[id].status === 'occupied') {
      state.tables._now = { seat: id, time: Date.now() };
    } else {
      delete state.tables._now;
    }
    const ok = await saveTables();
    if (!ok) alert('No se pudo guardar, intenta de nuevo.');
    updateNowControl();
    updateStaffQueue();
  };
  KW.toggleHistory = function () { state.showHistory = !state.showHistory; updateStaffQueue(); };
  KW.armReset = function () { state.resetArmed = true; updateAdminShellButtons(); };
  KW.cancelReset = function () { state.resetArmed = false; updateAdminShellButtons(); };
  KW.confirmReset = async function () {
    if (isWaiter()) return;
    state.tables = defaultTables();
    await saveTables();
    state.requests = [];
    await saveRequests();
    state.resetArmed = false;
    state.msgOpenFor = null;
    updateStaffSeats();
    updateStaffQueue();
    updateAdminShellButtons();
    updateNowControl();
  };

  // --- mensajes rápidos (admin y mozos) ---
  KW.toggleComposer = function (id) {
    id = String(id);
    state.msgOpenFor = (String(state.msgOpenFor) === id) ? null : id;
    state.sentNoteFor = null;
    updateStaffSeats();
    const input = document.getElementById('kw-msg-input-' + id);
    if (input) input.focus();
  };
  async function sendMessageTo(id, text) {
    text = (text || '').trim();
    if (!text) return;
    await refreshTables();
    const t = state.tables[id];
    if (!t || t.status !== 'occupied') { state.msgOpenFor = null; updateStaffSeats(); return; }
    t.message = { id: Date.now() + '-' + Math.random().toString(36).slice(2, 5), text: text, time: Date.now() };
    const ok = await saveTables();
    if (!ok) { alert('No se pudo enviar el mensaje, intenta de nuevo.'); return; }
    state.msgOpenFor = null;
    state.sentNoteFor = String(id);
    updateStaffSeats();
    setTimeout(() => { if (state.sentNoteFor === String(id)) { state.sentNoteFor = null; if (state.msgOpenFor === null) updateStaffSeats(); } }, 2500);
  }
  KW.sendPreset = function (id, idx) { return sendMessageTo(id, CONFIG.quickMessages[idx]); };
  KW.sendCustom = function (e, id) {
    e.preventDefault();
    const input = document.getElementById('kw-msg-input-' + id);
    if (input) return sendMessageTo(id, input.value);
  };

  // ---------- render: pieces ----------
  function partySelectHtml(id, current) {
    let opts = `<option value=""${current == null ? ' selected' : ''}>—</option>`;
    for (let i = 1; i <= 15; i++) {
      opts += `<option value="${i}"${Number(current) === i ? ' selected' : ''}>${i}</option>`;
    }
    return `<select onchange="KW.setPartySizeAdmin('${id}', this.value)" title="Corregir número de personas">${opts}</select>`;
  }

  function seatCardHtml(id) {
    const t = state.tables[id];
    if (!t) return '';
    const ro = isWaiter();
    const label = seatLabel(id).toUpperCase();
    if (t.status === 'occupied') {
      let composer = '';
      if (String(state.msgOpenFor) === id) {
        const chips = CONFIG.quickMessages.map((m, i) =>
          `<button class="kw-chip" onclick="KW.sendPreset('${id}', ${i})">${escapeHtml(m)}</button>`).join('');
        composer = `<div class="kw-composer">
          ${chips}
          <form onsubmit="KW.sendCustom(event, '${id}')" style="display:flex;gap:6px;">
            <input id="kw-msg-input-${id}" placeholder="Mensaje personalizado…" autocomplete="off" />
            <button type="submit" class="kw-btn lime sm">Enviar</button>
          </form>
        </div>`;
      }
      const lim = songLimit(t.partySize);
      const partyRow = ro
        ? `<div class="kw-party-row">👥 ${t.partySize ? t.partySize + ' pers · ' + lim + ' 🎵' : 'sin registrar'}</div>`
        : `<div class="kw-party-row">👥 ${partySelectHtml(id, t.partySize)} pers ${t.partySize ? '· ' + lim + ' 🎵' : '· sin registrar'}</div>`;
      const sentNote = state.sentNoteFor === id ? `<span class="kw-sent-note">MENSAJE ENVIADO ✓</span>` : '';
      const closeBtn = ro ? '' : `<button class="kw-btn danger sm" onclick="KW.closeSeat('${id}')">Cerrar ${t.type === 'barra' ? 'barra' : 'mesa'}</button>`;
      return `<div class="kw-tcard live">
        <div class="tnum">${seatIcon(id)} ${escapeHtml(label)}</div>
        <div class="kw-status"><span class="kw-dot live"></span><span style="color:var(--lime)">EN VIVO</span></div>
        <div class="code-big">${escapeHtml(t.code)}</div>
        ${partyRow}
        ${sentNote}
        <button class="kw-btn outline-lime sm" onclick="KW.toggleComposer('${id}')">${String(state.msgOpenFor) === id ? 'Cancelar mensaje' : '💬 Enviar mensaje'}</button>
        ${composer}
        ${closeBtn}
      </div>`;
    }
    const removeBtn = ro ? '' : `<button class="kw-remove" onclick="KW.removeSeat('${id}')" title="Quitar">✕</button>`;
    const openBtn = ro ? '' : `<button class="kw-btn lime sm" onclick="KW.openSeat('${id}')">Abrir ${t.type === 'barra' ? 'barra' : 'mesa'}</button>`;
    return `<div class="kw-tcard">
      ${removeBtn}
      <div class="tnum">${seatIcon(id)} ${escapeHtml(label)}</div>
      <div class="kw-status"><span class="kw-dot free"></span><span style="color:var(--free)">LIBRE</span></div>
      <div class="free-tag">Sin código asignado</div>
      ${openBtn}
    </div>`;
  }

  function updateStaffSeats() {
    const mesasEl = document.getElementById('kw-mesas-grid');
    const barraEl = document.getElementById('kw-barra-grid');
    const ro = isWaiter();
    if (mesasEl) {
      mesasEl.innerHTML = seatsOf('mesa').map(seatCardHtml).join('') +
        (ro ? '' : `<button class="kw-addcard" onclick="KW.addSeat('mesa')">+ Agregar mesa</button>`);
    }
    if (barraEl) {
      barraEl.innerHTML = seatsOf('barra').map(seatCardHtml).join('') +
        (ro ? '' : `<button class="kw-addcard" onclick="KW.addSeat('barra')">+ Agregar silla de barra</button>`);
    }
  }

  function requestMetaHtml(r, darkBg) {
    const bits = [];
    if (r.artist) bits.push(escapeHtml(r.artist));
    if (r.singer) bits.push('canta: ' + escapeHtml(r.singer)); // registros antiguos
    const url = safeLink(r.link);
    if (url) bits.push(`<a href="${escapeHtml(url)}" target="_blank" rel="noopener">🔗 abrir video</a>`);
    else if (r.link) bits.push('🔗 ' + escapeHtml(r.link));
    return bits.length ? `<div class="qmeta">${bits.join(' · ')}</div>` : '';
  }

  function modeTagHtml(r) {
    const m = r.mode === 'escuchar' ? 'escuchar' : 'cantar';
    return `<span class="kw-mode ${m}">${m === 'escuchar' ? '🎧 ESCUCHAR' : '🎤 CANTAR'}</span>`;
  }

  function queueRowHtml(r, withBadge) {
    const ro = isWaiter();
    const cls = r.status === 'done' ? 'done' : (r.status === 'cancelled' ? 'cancelled' : '');
    let actions = '';
    if (!ro) {
      actions = r.status === 'pending'
        ? `<div class="qactions">
            <button class="kw-iconbtn ok" title="Marcar reproducida" onclick="KW.markDone('${r.id}')">✓</button>
            <button class="kw-iconbtn del" title="Eliminar" onclick="KW.deleteRequest('${r.id}')">🗑</button>
          </div>`
        : `<div class="qactions"><button class="kw-iconbtn del" title="Eliminar" onclick="KW.deleteRequest('${r.id}')">🗑</button></div>`;
    }
    const badge = withBadge ? `<div class="qbadge">${escapeHtml(String(r.table))}</div>` : '';
    return `<div class="kw-qrow ${cls}">
      ${badge}
      <div class="qmain">
        <div class="qsong">${escapeHtml(r.song)}${modeTagHtml(r)}</div>
        ${requestMetaHtml(r)}
      </div>
      <div class="qtime mono">${timeAgo(r.time)}</div>
      ${actions}
    </div>`;
  }

  function updateStaffQueue() {
    const el = document.getElementById('kw-queue-list');
    if (!el) return;
    const ro = isWaiter();
    const pending = state.requests.filter(r => r.status === 'pending').sort((a, b) => a.time - b.time);
    const history = state.requests.filter(r => r.status !== 'pending').sort((a, b) => b.time - a.time);
    const nowId = nowSeatId();

    let html = '';
    if (!pending.length) {
      html += `<div class="kw-empty">La cola está vacía. Cuando pidan canciones, aparecerán aquí.</div>`;
    } else {
      const groups = {};
      pending.forEach(r => {
        const key = String(r.table);
        if (!groups[key]) groups[key] = [];
        groups[key].push(r);
      });
      const orderedIds = seatsOf('mesa').concat(seatsOf('barra')).filter(id => groups[id]);
      const orphanIds = Object.keys(groups).filter(id => orderedIds.indexOf(id) === -1);
      orderedIds.push.apply(orderedIds, orphanIds);

      html += orderedIds.map(id => {
        const rows = groups[id];
        const label = state.tables[id] ? seatLabel(id).toUpperCase() : id;
        const icon = state.tables[id] ? seatIcon(id) : '❔';
        const n = rows.length;
        let stageBit = '';
        if (nowId === id) stageBit = `<span class="kw-onstage">🎤 EN ESCENARIO</span>`;
        else if (!ro && state.tables[id]) stageBit = `<button class="kw-mini-stage" onclick="KW.setNow('${id}')" title="Marcar en escenario">🎤 ▶</button>`;
        return `<div class="kw-qgroup">
          <div class="kw-qgroup-head">
            <span>${icon} ${escapeHtml(label)}</span>
            <span class="right"><span class="count">${n} ${n === 1 ? 'canción' : 'canciones'}</span>${stageBit}</span>
          </div>
          ${rows.map(r => queueRowHtml(r, false)).join('')}
        </div>`;
      }).join('');
    }

    if (!ro) {
      html += `<div class="kw-history-toggle"><button class="kw-link" onclick="KW.toggleHistory()">${state.showHistory ? 'Ocultar historial ▲' : 'Ver historial (' + history.length + ') ▼'}</button></div>`;
      if (state.showHistory) {
        html += history.length ? history.map(r => queueRowHtml(r, true)).join('') : `<div class="kw-empty">Todavía no hay historial.</div>`;
      }
    }
    el.innerHTML = html;
  }

  function updateAdminShellButtons() {
    const el = document.getElementById('kw-reset-zone');
    if (!el) return;
    el.innerHTML = state.resetArmed
      ? `<span style="font-size:12.5px;color:var(--fog);margin-right:8px;">¿Borrar todas las mesas, la barra y la cola?</span>
         <button class="kw-btn danger sm" onclick="KW.confirmReset()">Sí, reiniciar</button>
         <button class="kw-btn ghost sm" onclick="KW.cancelReset()">Cancelar</button>`
      : `<button class="kw-link" onclick="KW.armReset()">Reiniciar noche</button>`;
  }

  // Control "ahora canta" (solo en el panel de admin)
  function updateNowControl() {
    const el = document.getElementById('kw-now-card');
    if (!el) return;
    const cur = nowSeatId();
    const occupied = seatsOf('mesa').concat(seatsOf('barra')).filter(id => state.tables[id].status === 'occupied');
    const opts = [`<option value=""${cur ? '' : ' selected'}>— nadie —</option>`]
      .concat(occupied.map(id => `<option value="${id}"${cur === id ? ' selected' : ''}>${escapeHtml(seatLabel(id))}</option>`))
      .join('');
    el.innerHTML = `<span class="nlabel">🎤 En el escenario</span>
      <span class="ncurrent">${cur ? seatIcon(cur) + ' ' + escapeHtml(seatLabel(cur).toUpperCase()) : '— libre —'}</span>
      <select onchange="KW.setNow(this.value)" title="Elegir quién está cantando">${opts}</select>`;
  }

  // Línea "ahora canta" (cliente y mozos)
  function updateNowLine() {
    const el = document.getElementById('kw-now-zone');
    if (!el) return;
    const cur = nowSeatId();
    if (!cur) {
      el.innerHTML = `<div class="kw-now-line idle">🎬 El escenario está libre por ahora…</div>`;
      return;
    }
    if (state.currentSeat && cur === state.currentSeat) {
      el.innerHTML = `<div class="kw-now-line mine">🎤 ¡ES TU TURNO! Sube al escenario 🎉</div>`;
    } else {
      el.innerHTML = `<div class="kw-now-line">🎤 Ahora canta: <strong>${escapeHtml(seatLabel(cur).toUpperCase())}</strong></div>`;
    }
  }

  function myQueueItemHtml(r) {
    const tag = r.status === 'done' ? '<span class="kw-tag done">¡Ya cantaste! ✓</span>' : (r.status === 'cancelled' ? '<span class="kw-tag cancelled">Cancelada</span>' : '<span class="kw-tag pending">En cola</span>');
    return `<div class="kw-stub">
      <div class="qsong">${escapeHtml(r.song)}${modeTagHtml(r)}</div>
      ${requestMetaHtml(r)}
      ${tag}
    </div>`;
  }

  function updateMyQueue() {
    const el = document.getElementById('kw-my-queue');
    if (!el) return;
    const mine = state.requests.filter(r => String(r.table) === String(state.currentSeat)).sort((a, b) => b.time - a.time);
    el.innerHTML = mine.length
      ? mine.map(myQueueItemHtml).join('')
      : `<div class="kw-empty">Aún no has pedido canciones. Completa el formulario y será la primera.</div>`;
  }

  function updateMsgBanner() {
    const el = document.getElementById('kw-msg-banner-zone');
    if (!el) return;
    const t = state.tables[state.currentSeat];
    const msg = t && t.message;
    if (msg && msg.id !== state.dismissedMsgId) {
      el.innerHTML = `<div class="kw-msg-banner">
        <div class="mtxt"><span class="mfrom">Mensaje del staff · ${timeAgo(msg.time)}</span>${escapeHtml(msg.text)}</div>
        <button onclick="KW.dismissMsg()" title="Descartar">✕</button>
      </div>`;
    } else {
      el.innerHTML = '';
    }
  }

  // ---------- render: full views ----------
  function render() {
    if (state.view === 'login') root.innerHTML = viewLogin();
    else if (state.view === 'staffLogin') root.innerHTML = viewStaffLogin();
    else if (state.view === 'customer') { root.innerHTML = viewCustomer(); updateNowLine(); updateMyQueue(); updateMsgBanner(); }
    else if (state.view === 'admin') { root.innerHTML = viewAdmin(); updateStaffSeats(); updateStaffQueue(); updateAdminShellButtons(); updateNowControl(); }
    else if (state.view === 'waiter') { root.innerHTML = viewWaiter(); updateStaffSeats(); updateStaffQueue(); updateNowLine(); }
    else root.innerHTML = `<div class="kw-wrap"><div style="padding:60px 0;color:var(--fog);font-family:'Space Mono',monospace;">Cargando…</div></div>`;

    const codeInput = document.getElementById('kw-code-input');
    if (codeInput) codeInput.focus();
    const pinInput = document.getElementById('kw-pin-input');
    if (pinInput) pinInput.focus();
  }

  function viewLogin() {
    return `<div class="kw-wrap">
      <div class="kw-brand">
        <img class="logo" src="${LOGO_SRC}" alt="${escapeHtml(CONFIG.venueName)}" />
        <div class="welcome">Bienvenido a Etnia, ¡pide tus canciones y canta! 🎤</div>
      </div>
      <div class="kw-ticket">
        <form onsubmit="KW.handleLoginSubmit(event)">
          <span class="kw-label">¿Dónde estás sentado?</span>
          <div class="kw-type-toggle">
            <button type="button" id="kw-type-mesa" class="kw-type-btn${state.loginType === 'mesa' ? ' active' : ''}" onclick="KW.setLoginType('mesa')">🍽️ Mesa</button>
            <button type="button" id="kw-type-barra" class="kw-type-btn${state.loginType === 'barra' ? ' active' : ''}" onclick="KW.setLoginType('barra')">🍹 Barra</button>
          </div>
          <span class="kw-label">Código que te dio tu mozo</span>
          <div class="kw-field">
            <input id="kw-code-input" class="kw-input code" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="0000" autocomplete="off" />
          </div>
          <button type="submit" class="kw-btn lime">Entrar</button>
          <div class="kw-error" id="kw-login-error">${escapeHtml(state.loginError)}</div>
        </form>
        <div class="perf"></div>
        <div style="text-align:center;font-size:12.5px;color:var(--ink-soft);">Pídele el código a tu mozo para empezar a pedir canciones.</div>
      </div>
      <div class="kw-footlink"><button class="kw-link" onclick="KW.goStaffLogin()">Acceso del staff</button></div>
      ${socialFooterHtml()}
    </div>`;
  }

  function viewStaffLogin() {
    return `<div class="kw-wrap">
      <div class="kw-brand">
        <img class="logo" src="${LOGO_SRC}" alt="${escapeHtml(CONFIG.venueName)}" style="width:min(220px, 60vw);" />
        <div class="eyebrow">Acceso del staff</div>
      </div>
      <div class="kw-ticket">
        <form onsubmit="KW.handleStaffLoginSubmit(event)">
          <span class="kw-label">Código de staff (admin o mozo)</span>
          <div class="kw-field">
            <input id="kw-pin-input" class="kw-input" type="password" maxlength="30" placeholder="Tu código" autocomplete="off" />
          </div>
          <button type="submit" class="kw-btn lime">Ingresar</button>
          <div class="kw-error" id="kw-admin-error">${escapeHtml(state.adminError)}</div>
        </form>
      </div>
      <div class="kw-footlink"><button class="kw-link" onclick="KW.backToLogin()">← Volver</button></div>
    </div>`;
  }

  function partyPickerHtml() {
    const btns = [1,2,3,4,5,6,7].map(n =>
      `<button class="kw-party-btn" onclick="KW.setPartySize(${n})">${n}</button>`).join('') +
      `<button class="kw-party-btn" onclick="KW.setPartySize(8)">8+</button>`;
    return `<div class="kw-ticket">
      <span class="kw-label">¿Cuántas personas son en tu grupo?</span>
      <div class="kw-party-grid">${btns}</div>
      <div class="kw-party-note">🎵 1 persona → 1 canción &nbsp;·&nbsp; 2 a 6 → 2 canciones &nbsp;·&nbsp; 7 a más → 3 canciones</div>
      <div class="kw-party-note funny">😜 Sé honesto con el número… los mozos tienen visión de águila 🦅👀 ¡y a los tramposos les corrigen la cuenta más rápido de lo que dura un coro! 😂</div>
    </div>`;
  }

  function orderFormHtml() {
    return `<div class="kw-ticket">
      <span class="kw-label">Pide tu canción</span>
      <form onsubmit="KW.handleSubmitSong(event)">
        <span class="kw-label" style="margin-top:4px;">¿La quieres para cantar o para escuchar?</span>
        <div class="kw-type-toggle">
          <button type="button" id="kw-mode-cantar" class="kw-type-btn${state.songMode === 'cantar' ? ' active' : ''}" onclick="KW.setSongMode('cantar')">🎤 Cantar</button>
          <button type="button" id="kw-mode-escuchar" class="kw-type-btn${state.songMode === 'escuchar' ? ' active' : ''}" onclick="KW.setSongMode('escuchar')">🎧 Escuchar</button>
        </div>
        <div class="kw-field">
          <input id="kw-song" class="kw-input" placeholder="Nombre de la canción" autocomplete="off" />
        </div>
        <div class="kw-field">
          <input id="kw-artist" class="kw-input" placeholder="Artista (opcional)" autocomplete="off" />
        </div>
        <div class="kw-field" style="margin-bottom:7px;">
          <input id="kw-songlink" class="kw-input" type="url" placeholder="Link de la canción (opcional)" autocomplete="off" />
        </div>
        <div class="kw-hint">🔗 Tienes la opción de colocar el link del video específico que deseas (por ejemplo, de YouTube).</div>
        <button type="submit" id="kw-submit-btn" class="kw-btn lime">Pedir canción</button>
        <div class="kw-error" id="kw-song-error"></div>
      </form>
    </div>
    <div style="height:26px;"></div>
    <div class="kw-section-title"><h2>Tu cola — ${escapeHtml(seatLabel(state.currentSeat))}</h2></div>
    <div id="kw-my-queue" style="width:100%;"></div>`;
  }

  function viewCustomer() {
    const code = state.sessionCode || '';
    const limitLine = state.customerMode === 'order'
      ? `<div class="kw-limit-info" id="kw-limit-info">${limitInfoText()}</div>` : '';
    return `<div class="kw-wrap">
      <div class="kw-topbar">
        <div class="title"><img class="logo-sm" src="${LOGO_SRC}" alt="" /><span class="display">${escapeHtml(seatLabel(state.currentSeat))}</span><span class="mono">${escapeHtml(code)}</span></div>
        <button class="kw-link" onclick="KW.exitCustomer()">Salir</button>
      </div>
      <div id="kw-now-zone" style="width:100%;"></div>
      ${limitLine}
      <div id="kw-msg-banner-zone" style="width:100%;"></div>
      ${state.customerMode === 'picker' ? partyPickerHtml() : orderFormHtml()}
      ${rulesHtml()}
    </div>`;
  }

  function viewAdmin() {
    return `<div class="kw-wrap wide">
      <div class="kw-topbar">
        <div class="title"><img class="logo-sm" src="${LOGO_SRC}" alt="" /><span class="display">Panel de administrador</span></div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span id="kw-reset-zone"></span>
          <button class="kw-link" onclick="KW.backToLogin()">Cerrar sesión</button>
        </div>
      </div>
      <div class="kw-now-card" id="kw-now-card"></div>
      <div class="kw-section-title"><h2>🍽️ Mesas</h2></div>
      <div class="kw-grid" id="kw-mesas-grid"></div>
      <div class="kw-section-title"><h2>🍹 Barra</h2></div>
      <div class="kw-grid" id="kw-barra-grid"></div>
      <div class="kw-section-title"><h2>Cola de canciones</h2></div>
      <div id="kw-queue-list" style="width:100%;"></div>
    </div>`;
  }

  function viewWaiter() {
    return `<div class="kw-wrap wide">
      <div class="kw-topbar">
        <div class="title"><img class="logo-sm" src="${LOGO_SRC}" alt="" /><span class="display">Panel de mozo</span><span class="mono">👤 ${escapeHtml(state.waiterName || '')}</span></div>
        <button class="kw-link" onclick="KW.backToLogin()">Cerrar sesión</button>
      </div>
      <div id="kw-now-zone" style="width:100%;"></div>
      <div class="kw-section-title"><h2>🍽️ Mesas</h2></div>
      <div class="kw-grid" id="kw-mesas-grid"></div>
      <div class="kw-section-title"><h2>🍹 Barra</h2></div>
      <div class="kw-grid" id="kw-barra-grid"></div>
      <div class="kw-section-title"><h2>Canciones pendientes</h2></div>
      <div id="kw-queue-list" style="width:100%;"></div>
    </div>`;
  }

  init();
})();
</script>
</body>
</html>
